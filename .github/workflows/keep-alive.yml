name: Keep deploy + Supabase warm

# Pinga el deploy una vez por día para evitar que Supabase auto-pause
# el proyecto Free después de 7 días sin actividad. La query a Supabase
# se dispara cuando la página carga (lista los locales para el
# marketplace), así que con una sola visita por día ya alcanza.

on:
  schedule:
    # Todos los días a las 12:00 UTC (~ 09:00 ART). Cron format estándar.
    - cron: '0 12 * * *'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping deploy
        env:
          PING_URL: ${{ vars.PING_URL }}
        run: |
          if [ -z "$PING_URL" ]; then
            echo "::warning ::No PING_URL var configured. Skipping."
            echo "Setealo en Settings → Variables → Actions con la URL"
            echo "de tu deploy (ej. https://pedidosexpress-jade.vercel.app/)."
            exit 0
          fi
          echo "Pinging $PING_URL"
          curl -fsSL --max-time 30 "$PING_URL" > /dev/null
          echo "OK"
